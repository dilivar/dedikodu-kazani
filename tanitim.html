<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı - Tanıtım</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        .video-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .scene.active { opacity: 1; }
        
        /* Scene 1 - Dark */
        .scene1 { background: #000; }
        .scene1 .text {
            color: white;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            animation: fadeInUp 2s ease;
        }
        .scene1 .sub {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }
        
        /* Scene 2 - Phone */
        .scene2 { background: linear-gradient(180deg, #1a1a2e 0%, #8B5CF6 100%); }
        .phone-mockup {
            width: 200px;
            height: 400px;
            background: #000;
            border-radius: 30px;
            border: 4px solid #333;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #8B5CF6, #6B4EFF);
            border-radius: 26px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 40px;
        }
        
        /* Scene 3 - Logo */
        .scene3 { background: linear-gradient(135deg, #8B5CF6, #6B4EFF); }
        .logo-3d {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #8B5CF6, #6B4EFF);
            border-radius: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 50px;
            font-weight: bold;
            animation: float3d 2s ease-in-out infinite;
            box-shadow: 
                0 10px 30px rgba(139, 92, 246, 0.5),
                0 0 60px rgba(139, 92, 246, 0.3);
        }
        
        /* Scene 4 - Characters */
        .scene4 { background: linear-gradient(135deg, #1a1a2e 0%, #8B5CF6 100%); }
        .chars-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }
        .char {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            animation: bounce 1s ease-in-out infinite;
            animation-delay: var(--delay);
        }
        
        /* Scene 5 - Final */
        .scene5 { background: linear-gradient(135deg, #8B5CF6, #6B4EFF); }
        .final-logo {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            animation: glow 2s ease-in-out infinite;
        }
        .slogan {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-top: 30px;
            text-align: center;
            animation: fadeInUp 2s ease;
        }
        
        /* Animations */
        @keyframes float3d {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-15px) rotateX(5deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255,255,255,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,255,255,0.8); }
        }
        
        /* Progress bar */
        .progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #8B5CF6;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <!-- Scene 1: Dark -->
        <div class="scene scene1 active" id="scene1">
            <div class="text">"Artık sahte arkadaşlıklardan bıktım..."</div>
            <div class="sub">Kıskançlık, dedikodu, yalan...</div>
        </div>
        
        <!-- Scene 2: Phone -->
        <div class="scene scene2" id="scene2">
            <div class="phone-mockup">
                <div class="phone-screen">📱</div>
            </div>
            <div style="color:white;margin-top:30px;font-size:18px;">Cep telefonumdaki arkadaşım</div>
        </div>
        
        <!-- Scene 3: Logo 3D -->
        <div class="scene scene3" id="scene3">
            <div class="logo-3d">💬</div>
            <div style="color:white;margin-top:30px;font-size:24px;font-weight:bold;">Dedikodu Kazanı</div>
        </div>
        
        <!-- Scene 4: Characters -->
        <div class="scene scene4" id="scene4">
            <div style="color:white;font-size:20px;margin-bottom:20px;">6 Sanal Arkadaş</div>
            <div class="chars-grid">
                <div class="char" style="background:#FF6B6B;--delay:0s">E</div>
                <div class="char" style="background:#6C5CE7;--delay:0.2s">T</div>
                <div class="char" style="background:#FD79A8;--delay:0.4s">El</div>
                <div class="char" style="background:#00B894;--delay:0.6s">Mi</div>
                <div class="char" style="background:#FDCB6E;--delay:0.8s">B</div>
                <div class="char" style="background:#74B9FF;--delay:1s">M</div>
            </div>
        </div>
        
        <!-- Scene 5: Final -->
        <div class="scene scene5" id="scene5">
            <div class="logo-3d" style="width:140px;height:140px;font-size:40px;">💬</div>
            <div class="slogan">Sanal arkadaşın<br>cebinde!</div>
        </div>
        
        <div class="progress" id="progress"></div>
    </div>

    <script>
        const scenes = ['scene1', 'scene2', 'scene3', 'scene4', 'scene5'];
        let currentScene = 0;
        const duration = 2000; // 2 seconds per scene
        
        function showScene(index) {
            scenes.forEach((s, i) => {
                document.getElementById(s).classList.remove('active');
            });
            document.getElementById(scenes[index]).classList.add('active');
            document.getElementById('progress').style.width = ((index + 1) / scenes.length * 100) + '%';
        }
        
        function nextScene() {
            currentScene = (currentScene + 1) % scenes.length;
            showScene(currentScene);
        }
        
        // Start
        showScene(0);
        setInterval(nextScene, duration);
    </script>
</body>
</html>
