<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --primary: #8B5CF6;
            --primary-dark: #6B4EFF;
            --bg: #F5F0FF;
            --text: #1A1A2E;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .phone {
            width: 375px;
            height: 812px;
            background: var(--bg);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        
        .screen {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background: var(--bg);
        }
        
        .login-screen {
            padding: 50px 24px 24px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 30px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .app-title {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-align: center;
        }
        
        .app-subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .spacer { flex: 1; }
        
        .apple-btn {
            background: black;
            color: white;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .apple-btn:active { transform: scale(0.98); }
        
        .email-show {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            margin-bottom: 20px;
        }
        
        .or-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(255,255,255,0.5);
        }
        
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.3);
        }
        
        .or-divider span { padding: 0 16px; }
        
        .name-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .name-card h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .name-card p {
            color: #6B7280;
            font-size: 13px;
            margin-bottom: 16px;
        }
        
        .name-card input {
            width: 100%;
            padding: 14px;
            border: none;
            background: var(--bg);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
        }
        
        .name-card button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .name-card button:active { transform: scale(0.98); }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        <div class="screen">
            <div class="login-screen">
                <div class="logo">🌯</div>
                <h1 class="app-title">Dedikodu Kazanı</h1>
                <p class="app-subtitle">AI Arkadaşların Burada</p>
                
                <div class="spacer"></div>
                
                <!-- Apple Sign In -->
                <div class="apple-btn" onclick="login()">
                    <span style="font-size: 22px;">🍎</span>
                    <span>Apple ile devam et</span>
                </div>
                
                <!-- Email gösterimi -->
                <div class="email-show">
                    📧 hasan@example.com
                </div>
                
                <!-- Veya -->
                <div class="or-divider">
                    <span>veya</span>
                </div>
                
                <!-- İsim ile devam -->
                <div class="name-card">
                    <h3>İsminle başla</h3>
                    <p>Hesap oluşturmadan dene</p>
                    <input type="text" id="nameInput" placeholder="İsmin?">
                    <button onclick="loginWithName()">Başla</button>
                </div>
                
                <div class="footer">
                    © 2026 Dedikodu Kazanı
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            alert('🎉 Ana sayfaya yönlendiriliyorsun!');
            // Gerçek uygulamada burada Apple Sign In olacak
        }
        
        function loginWithName() {
            const name = document.getElementById('nameInput').value;
            if (!name) {
                alert('Lütfen ismini gir!');
                return;
            }
            alert('🎉 Hoşgeldin ' + name + '!');
        }
        
        // Enter ile giriş
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginWithName();
        });
    </script>
</body>
</html>
