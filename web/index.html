<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        :root {
            --primary: #8B5CF6;
            --primary-dark: #6B4EFF;
            --bg: #F5F0FF;
            --text: #1A1A2E;
            --text-light: #6B7280;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .phone {
            width: 375px;
            height: 812px;
            background: var(--bg);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        
        .screen {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background: var(--bg);
        }
        
        /* Login Screen */
        .login-screen {
            padding: 60px 24px 24px;
            text-align: center;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 30px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
        }
        
        .app-title {
            font-size: 28px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .app-subtitle {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .feature {
            background: rgba(139, 92, 246, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--primary);
        }
        
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .form-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .form-subtitle {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: var(--bg);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: box-shadow 0.3s;
        }
        
        .input-group input:focus {
            box-shadow: 0 0 0 2px var(--primary);
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .toggle-tabs {
            display: flex;
            margin-bottom: 20px;
            background: var(--bg);
            border-radius: 12px;
            padding: 4px;
        }
        
        .toggle-tab {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .toggle-tab.active {
            background: var(--primary);
            color: white;
        }
        
        /* Home Screen */
        .home-screen {
            display: none;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 50px 20px 30px;
            border-radius: 0 0 30px 30px;
            text-align: center;
            color: white;
        }
        
        .header-logo {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .header-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .header-subtitle {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .section-title {
            padding: 20px 20px 12px;
            font-size: 18px;
            font-weight: bold;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .badge {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: normal;
        }
        
        .character-list {
            padding: 0 20px;
        }
        
        .character-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .character-card:active {
            transform: scale(0.98);
        }
        
        .character-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .character-info {
            flex: 1;
        }
        
        .character-name {
            font-weight: bold;
            font-size: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .character-desc {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }
        
        .character-action {
            width: 44px;
            height: 44px;
            background: var(--bg);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        
        .fab {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
            cursor: pointer;
        }
        
        /* Bottom nav */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-light);
            font-size: 10px;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-icon {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        
        <div class="screen" id="screen">
            <!-- Login Screen -->
            <div class="login-screen" id="loginScreen">
                <div class="logo">🌯</div>
                <h1 class="app-title">Dedikodu Kazanı</h1>
                <p class="app-subtitle">AI Arkadaşların Burada</p>
                
                <div class="features">
                    <span class="feature">💬 Sohbet</span>
                    <span class="feature">🎙️ Sesli</span>
                    <span class="feature">👥 Grup</span>
                </div>
                
                <div class="form-card">
                    <div class="toggle-tabs">
                        <div class="toggle-tab active" onclick="switchTab('login')">Giriş</div>
                        <div class="toggle-tab" onclick="switchTab('register')">Kayıt</div>
                    </div>
                    
                    <h2 class="form-title">Hoş Geldin!</h2>
                    <p class="form-subtitle">İsmini gir ve başla</p>
                    
                    <div class="input-group">
                        <input type="text" placeholder="İsmin?">
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="E-posta">
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Parola">
                    </div>
                    
                    <button class="btn-primary" onclick="goToHome()">Başla</button>
                </div>
            </div>
            
            <!-- Home Screen -->
            <div class="home-screen" id="homeScreen">
                <div class="header">
                    <div class="header-logo">🌯</div>
                    <h1 class="header-title">Hoşgeldin!</h1>
                    <p class="header-subtitle">AI Arkadaşların burada</p>
                </div>
                
                <div class="section-title">
                    Karakterler
                    <span class="badge">2/6 Açık</span>
                </div>
                
                <div class="character-list">
                    <div class="character-card" onclick="openChat()">
                        <div class="character-avatar">👩‍🎤</div>
                        <div class="character-info">
                            <div class="character-name">Eda Mayan</div>
                            <div class="character-desc">Sivri dilli, şakacı 🎭</div>
                        </div>
                        <div class="character-action">💬</div>
                    </div>
                    
                    <div class="character-card" onclick="openChat()">
                        <div class="character-avatar">💕</div>
                        <div class="character-info">
                            <div class="character-name">Ela Soyman</div>
                            <div class="character-desc">İyi niyetli, sıcak 💕</div>
                        </div>
                        <div class="character-action">💬</div>
                    </div>
                </div>
                
                <div class="fab" onclick="showGroupChat()">👥</div>
                
                <div class="bottom-nav">
                    <div class="nav-item active">
                        <span class="nav-icon">🏠</span>
                        <span>Anasayfa</span>
                    </div>
                    <div class="nav-item">
                        <span class="nav-icon">👥</span>
                        <span>Sohbet</span>
                    </div>
                    <div class="nav-item">
                        <span class="nav-icon">💎</span>
                        <span>Premium</span>
                    </div>
                    <div class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span>Ayarlar</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentScreen = 'login';
        
        function switchTab(tab) {
            document.querySelectorAll('.toggle-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function goToHome() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'block';
            currentScreen = 'home';
        }
        
        function openChat() {
            alert('💬 Chat ekranı açılıyor...\n\n(Tam sürümde gerçek chat)');
        }
        
        function showGroupChat() {
            alert('👥 Grup sohbeti açılıyor...\n\n(Tam sürümde gerçek grup chat)');
        }
        
        // Touch/drag support for mobile feel
        const screen = document.getElementById('screen');
        let startY = 0;
        
        screen.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
        });
        
        screen.addEventListener('touchend', e => {
            const endY = e.changedTouches[0].clientY;
            if (startY - endY > 50) {
                // Swipe up - next screen
            }
        });
    </script>
</body>
</html>
