<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
        :root { --primary: #8B5CF6; --bg: #F5F0FF; }
        body { background: linear-gradient(135deg, var(--primary), #6B4EFF); display: flex; justify-content: center; }
        .phone { width: 100%; max-width: 393px; background: var(--bg); position: relative; overflow: hidden; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 0 0 20px 20px; z-index: 100; }
        
        .screen { display: none; height: 100%; overflow-y: auto; }
        .screen.active { display: block; }
        
        .header { background: linear-gradient(135deg, var(--primary), #6B4EFF); padding: 50px 20px 20px; color: white; border-radius: 0 0 30px 30px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px; }
        .card { background: white; border-radius: 16px; padding: 14px; text-align: center; position: relative; }
        .card-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), #6B4EFF); border-radius: 12px; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .card-name { font-weight: bold; font-size: 13px; }
        .card-badge { position: absolute; top: 8px; right: 8px; background: linear-gradient(135deg, #FFD700, #FFA500); color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; }
        
        .fab { position: absolute; bottom: 90px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), #6B4EFF); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        
        .nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 20px 20px 0 0; }
        
        .chat-header { background: white; padding: 45px 16px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; }
        .chat-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #6B4EFF); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .chat-name { font-weight: bold; font-size: 16px; }
        
        .chat-messages { padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .msg-received { background: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-sent { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        
        .typing { display: flex; gap: 4px; padding: 8px; }
        .typing span { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: typing 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
        
        .quick-reply { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px; background: #f5f0ff; }
        .quick-btn { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 20px; font-size: 12px; white-space: nowrap; }
        
        .chat-input-area { background: white; padding: 12px 16px; display: flex; gap: 12px; border-top: 1px solid #eee; position: sticky; bottom: 0; }
        .chat-input { flex: 1; background: var(--bg); border: none; border-radius: 24px; padding: 12px 16px; font-size: 14px; outline: none; }
        .chat-send { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), #6B4EFF); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; }
        
        .premium-popup { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .premium-popup.active { display: flex; }
        .premium-content { background: linear-gradient(135deg, #FFD700, #FFA500); padding: 30px; border-radius: 20px; text-align: center; color: white; max-width: 300px; }
        .premium-content h2 { margin-bottom: 10px; }
        .premium-content button { background: white; color: #FFD700; border: none; padding: 12px 24px; border-radius: 24px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        
        <!-- PREMIUM POPUP -->
        <div class="premium-popup" id="premiumPopup">
            <div class="premium-content">
                <h2>💎 Premium</h2>
                <p>Bu karakter Premium!</p>
                <p style="font-size: 24px; font-weight: bold; margin: 15px 0;">9.99€/ay</p>
                <button onclick="closePremium()">Kapat</button>
            </div>
        </div>
        
        <!-- HOME -->
        <div class="screen active" id="homeScreen">
            <div class="header">
                <h1 style="font-size:22px;font-weight:bold;">Dedikodu Kazanı 💬</h1>
                <p style="font-size:13px;opacity:0.9;">Sonsuz magazin + Hava Durumu!</p>
            </div>
            
            <div style="padding:16px 20px 8px;font-weight:bold;">Karakterler</div>
            
            <div class="grid">
                <div class="card" onclick="openChat('Eda')">
                    <div class="card-avatar">👩‍🍳</div>
                    <div class="card-name">Eda</div>
                </div>
                <div class="card" onclick="openChat('Ela')">
                    <div class="card-avatar">💅</div>
                    <div class="card-name">Ela</div>
                </div>
                <div class="card" onclick="openPremium('Zeynep')">
                    <div class="card-badge">💎 9.99€</div>
                    <div class="card-avatar">🥗</div>
                    <div class="card-name">Zeynep</div>
                </div>
                <div class="card" onclick="openPremium('Derin')">
                    <div class="card-badge">💎 9.99€</div>
                    <div class="card-avatar">👶</div>
                    <div class="card-name">Derin</div>
                </div>
                <div class="card" onclick="openPremium('Rüzgar')">
                    <div class="card-badge">💎 9.99€</div>
                    <div class="card-avatar">💕</div>
                    <div class="card-name">Rüzgar</div>
                </div>
                <div class="card" onclick="openPremium('Mert')">
                    <div class="card-badge">💎 9.99€</div>
                    <div class="card-avatar">📰</div>
                    <div class="card-name">Mert</div>
                </div>
            </div>
            
            <div class="fab" onclick="openGroup()">👥</div>
            
            <div class="nav">
                <div style="display:flex;flex-direction:column;align-items:center;color:var(--primary);font-size:10px;"><span style="font-size:22px">🏠</span></div>
            </div>
        </div>
        
        <!-- CHAT -->
        <div class="screen" id="chatScreen">
            <div class="chat-header">
                <span onclick="goHome()" style="font-size:20px;cursor:pointer;">←</span>
                <div class="chat-avatar" id="chatAvatar">👩‍🍳</div>
                <div class="chat-name" id="chatName">Eda</div>
            </div>
            
            <div class="quick-reply">
                <button class="quick-btn" onclick="sendQuick('Magazin!')">📰 Magazin</button>
                <button class="quick-btn" onclick="sendQuick('Hava durumu?')">🌤️ Hava</button>
                <button class="quick-btn" onclick="sendQuick('Dedikodu!')">🔥 Dedikodu</button>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="typing" id="typingIndicator" style="display:none;">
                <span></span><span></span><span></span>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="Mesaj yaz..." onkeypress="handleKeyPress(event)">
                <div class="chat-send" onclick="sendMessage()">➤</div>
            </div>
        </div>
        
        <!-- GROUP -->
        <div class="screen" id="groupScreen">
            <div class="chat-header" style="background:linear-gradient(135deg,var(--primary),#6B4EFF);">
                <span onclick="goHome()" style="font-size:20px;cursor:pointer;color:white;">←</span>
                <div class="chat-name" style="color:white;">Grup 🔥</div>
            </div>
            <div class="chat-messages" id="groupMessages">
                <div class="msg msg-received"><b>Mert:</b> Selam! Magazin çok sıcak!<div class="msg-time">14:30</div></div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="groupInput" placeholder="Gruba katıl...">
                <div class="chat-send" onclick="sendToGroup()">➤</div>
            </div>
        </div>
    </div>

    <script>
        // GOOGLE AI API
        const API_KEY = 'AIzaSyD92NDDcQQFU4IQDOUqyKt_IyhF-Fs3k68';
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';
        
        let currentChar = 'Eda';
        let conversationHistory = [];
        
        const avatars = { 'Eda': '👩‍🍳', 'Ela': '💅', 'Zeynep': '🥗', 'Derin': '👶', 'Rüzgar': '💕', 'Mert': '📰' };
        
        // FULL AI SYSTEM - Tüm konuları yanıtlar
        async function getAIResponse(message) {
            const prompt = `Sen ${currentChar}'sin. Sen bir AKILLI YAPAY ZEKASIN!

KONUŞABİLECEĞİN KONULAR:
1. TÜRK MAGAZİN - Ünlüler, diziler, skandallar, aşk dedikoduları
2. GÜNCEL HABERLER - Türkiye ve dünya gündemi
3. HAVA DURUMU - Türkiye illerinin hava durumu
4. DEDİKODU - Her konuda sohbet
5. GÜNLÜK HAYAT - Yemek, stil, sağlık, ilişkiler

KURALLAR:
- Sorulan soruyu yanıtla
- Magazin, haber, hava durumu konuş
- Emoji kullan
- Kısa ve net yanıtlar ver
- Sohbet et`;

            const contents = [
                { role: 'user', parts: [{ text: prompt }] },
                ...conversationHistory.slice(-6).map(m => ({ role: m.isUser ? 'user' : 'model', parts: [{ text: m.text }] })),
                { role: 'user', parts: [{ text: message }] }
            ];
            
            const response = await fetch(API_URL + '?key=' + API_KEY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: contents,
                    generationConfig: { temperature: 0.9, maxOutputTokens: 600 }
                })
            });
            
            if (!response.ok) throw new Error('API hatası');
            
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }
        
        function openPremium(name) {
            document.getElementById('premiumPopup').classList.add('active');
        }
        
        function closePremium() {
            document.getElementById('premiumPopup').classList.remove('active');
        }
        
        function openChat(name) {
            currentChar = name;
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('chatName').textContent = name;
            document.getElementById('chatAvatar').textContent = avatars[name];
            
            conversationHistory = [];
            const chatMsgs = document.getElementById('chatMessages');
            chatMsgs.innerHTML = '';
            
            addMessage('📰 Merhaba! Ben ' + name + '!\n\nMagazin, haber, hava durumu, dedikodu... Her konuda konuşabiliriz! 😊', false);
        }
        
        function openGroup() {
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('groupScreen').classList.add('active');
        }
        
        function goHome() {
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('groupScreen').classList.remove('active');
            document.getElementById('homeScreen').classList.add('active');
            closePremium();
        }
        
        function addMessage(text, isUser) {
            const chatMsgs = document.getElementById('chatMessages');
            const now = new Date();
            const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ' + (isUser ? 'msg-sent' : 'msg-received');
            msgDiv.innerHTML = (isUser ? '' : '<b>' + currentChar + ':</b> ') + text.replace(/\n/g, '<br>') + '<div class="msg-time">' + time + '</div>';
            chatMsgs.appendChild(msgDiv);
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
        }
        
        function showTyping() {
            document.getElementById('typingIndicator').style.display = 'flex';
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typingIndicator').style.display = 'none';
        }
        
        function sendQuick(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            showTyping();
            
            try {
                const response = await getAIResponse(text);
                hideTyping();
                addMessage(response, false);
                conversationHistory.push({ text: text, isUser: true });
                conversationHistory.push({ text: response, isUser: false });
            } catch (e) {
                hideTyping();
                addMessage('Bağlantı hatası. Tekrar dene! 😔', false);
            }
        }
        
        function sendToGroup() {
            const input = document.getElementById('groupInput');
            const text = input.value.trim();
            if (!text) return;
            
            const chatMsgs = document.getElementById('groupMessages');
            const now = new Date();
            const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            
            chatMsgs.innerHTML += '<div class="msg msg-sent"><b>Sen:</b> ' + text + '<div class="msg-time">' + time + '</div></div>';
            input.value = '';
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
            
            setTimeout(() => {
                const responses = ['Mert: 🔥 İlginç!', 'Eda: Devam et!', 'Ela: Çok ilginç!'];
                chatMsgs.innerHTML += '<div class="msg msg-received">' + responses[Math.floor(Math.random() * responses.length)] + '<div class="msg-time">' + time + '</div></div>';
                chatMsgs.scrollTop = chatMsgs.scrollHeight;
            }, 1000);
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
