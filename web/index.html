<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
        :root { --primary: #8B5CF6; --bg: #F5F0FF; }
        body { background: linear-gradient(135deg, #8B5CF6, #6B4EFF); display: flex; justify-content: center; }
        .phone { width: 100%; max-width: 393px; background: var(--bg); position: relative; overflow: hidden; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 126px; height: 37px; background: #000; border-radius: 0 0 20px 20px; z-index: 100; }
        
        .screen { display: none; height: 100%; overflow-y: auto; }
        .screen.active { display: block !important; }
        
        .header { background: linear-gradient(135deg, #8B5CF6, #6B4EFF); padding: 50px 20px 20px; color: white; border-radius: 0 0 30px 30px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px; }
        .card { background: white; border-radius: 16px; padding: 14px; text-align: center; position: relative; cursor: pointer; }
        
        .avatar { 
            width: 44px; height: 44px; 
            border-radius: 12px; 
            margin: 0 auto 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: bold; color: white;
        }
        .avatar-e { background: linear-gradient(135deg, #FF6B6B, #EE5A24); }
        .avatar-el { background: linear-gradient(135deg, #FD79A8, #E84393); }
        .avatar-z { background: linear-gradient(135deg, #00B894, #00A085); }
        .avatar-d { background: linear-gradient(135deg, #6C5CE7, #5B4ECF); }
        .avatar-r { background: linear-gradient(135deg, #FDCB6E, #F39C12); }
        .avatar-m { background: linear-gradient(135deg, #74B9FF, #0984E3); }
        
        .card-name { font-weight: bold; font-size: 13px; color: #2D3436; }
        
        .premium-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .premium-modal.active { display: flex; }
        .premium-box { background: linear-gradient(135deg, #FFD700, #FFA500); padding: 30px; border-radius: 24px; text-align: center; color: white; max-width: 280px; margin: 20px; }
        .premium-box h2 { font-size: 28px; margin-bottom: 8px; }
        .premium-box .price { font-size: 36px; font-weight: bold; margin: 15px 0; }
        .premium-box button { background: white; color: #FFA500; border: none; padding: 14px 32px; border-radius: 24px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        
        .chat-header { background: white; padding: 45px 16px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: white; }
        .chat-name { font-weight: bold; font-size: 16px; }
        
        .chat-messages { padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .msg-received { background: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-sent { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        
        .quick-reply { display: flex; gap: 8px; overflow-x: auto; padding: 8px 16px; background: #f5f0ff; }
        .quick-btn { background: white; border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 20px; font-size: 12px; white-space: nowrap; }
        
        .chat-input-area { background: white; padding: 12px 16px; display: flex; gap: 12px; border-top: 1px solid #eee; position: sticky; bottom: 0; }
        .chat-input { flex: 1; background: var(--bg); border: none; border-radius: 24px; padding: 12px 16px; font-size: 14px; outline: none; }
        .chat-send { width: 44px; height: 44px; background: linear-gradient(135deg, #8B5CF6, #6B4EFF); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="notch"></div>
        
        <div class="premium-modal" id="premiumModal" onclick="closePremium(event)">
            <div class="premium-box" onclick="event.stopPropagation()">
                <h2>💎 Premium</h2>
                <p id="premiumCharName">Karakter</p>
                <div class="price">9.99€/ay</div>
                <p>Ücretsiz denemek için Eda veya Ela'yı seçin!</p>
                <button onclick="closePremium()">Kapat</button>
            </div>
        </div>
        
        <div class="screen active" id="homeScreen">
            <div class="header">
                <h1 style="font-size:22px;font-weight:bold;">Dedikodu Kazanı</h1>
                <p style="font-size:13px;opacity:0.9;">Sanal arkadaşların!</p>
            </div>
            
            <div style="padding:16px 20px 8px;font-weight:bold;">Arkadaşlar</div>
            
            <div class="grid">
                <div class="card" onclick="openChat('Eda')">
                    <div class="avatar avatar-e">E</div>
                    <div class="card-name">Eda</div>
                </div>
                <div class="card" onclick="openChat('Ela')">
                    <div class="avatar avatar-el">El</div>
                    <div class="card-name">Ela</div>
                </div>
                <div class="card" onclick="showPremium('Mila')">
                    <div style="position:absolute;top:8px;right:8px;font-size:14px;">💎</div>
                    <div class="avatar avatar-z" style="opacity:0.5;">Mi</div>
                    <div class="card-name">Mila</div>
                </div>
                <div class="card" onclick="showPremium('Teo')">
                    <div style="position:absolute;top:8px;right:8px;font-size:14px;">💎</div>
                    <div class="avatar avatar-d" style="opacity:0.5;">T</div>
                    <div class="card-name">Teo</div>
                </div>
                <div class="card" onclick="showPremium('Batu')">
                    <div style="position:absolute;top:8px;right:8px;font-size:14px;">💎</div>
                    <div class="avatar avatar-r" style="opacity:0.5;">B</div>
                    <div class="card-name">Batu</div>
                </div>
                <div class="card" onclick="showPremium('Mete')">
                    <div style="position:absolute;top:8px;right:8px;font-size:14px;">💎</div>
                    <div class="avatar avatar-m" style="opacity:0.5;">M</div>
                    <div class="card-name">Mete</div>
                </div>
            </div>
            
            <div class="screen" id="chatScreen">
                <div class="chat-header">
                    <span onclick="goHome()" style="font-size:20px;cursor:pointer;">←</span>
                    <div class="chat-avatar" id="chatAvatar">E</div>
                    <div class="chat-name" id="chatName">Eda</div>
                </div>
                
                <div class="quick-reply">
                    <button class="quick-btn" onclick="sendQuick('Merhaba!')">👋</button>
                    <button class="quick-btn" onclick="sendQuick('Nasılsın?')">😊</button>
                    <button class="quick-btn" onclick="sendQuick('Neler yapıyorsun?')">💬</button>
                </div>
                
                <div class="chat-messages" id="chatMessages"></div>
                
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="messageInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <div class="chat-send" onclick="sendMessage()">➤</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentChar = 'Eda';
        let conversationHistory = [];
        
        const avatarStyles = {
            'Eda': 'avatar-e',
            'Ela': 'avatar-el',
            'Mila': 'avatar-z',
            'Teo': 'avatar-d',
            'Batu': 'avatar-r',
            'Mete': 'avatar-m'
        };
        
        const avatarLabels = {
            'Eda': 'E',
            'Ela': 'El',
            'Mila': 'Mi',
            'Teo': 'T',
            'Batu': 'B',
            'Mete': 'M'
        };
        
        const smartResponses = {
            'Eda': {
                greetings: ['Selam! Nasılsın?', 'Merhaba! Bugün neler yapıyorsun?', 'Hey! Uzun zaman oldu!'],
                howareyou: ['İyiyim, sen nasılsın? 😊', 'Harika!', 'Meşgulüm, sen?'],
                default: ['Aa ilginç! 😄', 'Vay be! 👀', 'Devam et!', 'Helal olsun! 😎', 'Ciddi misin? 😱']
            },
            'Ela': {
                greetings: ['Merhaba! Nasılsın?', 'Selam!', 'Hey!'],
                howareyou: ['Harika görünüyorsun!', 'İyiyim! 😊', 'Güzel geçiyor! ✨'],
                default: ['Aww ne tatlı! 💕', 'Çok ilginç! 😍', 'Harika! 😊', 'Vay!']
            }
        };
        
        function getResponse(message) {
            const msg = message.toLowerCase();
            let responses = smartResponses[currentChar] || smartResponses['Eda'];
            
            if (msg.includes('merhaba') || msg.includes('selam') || msg.includes('hey')) {
                return responses.greetings[Math.floor(Math.random() * responses.greetings.length)];
            }
            if (msg.includes('nasılsın') || msg.includes('naber')) {
                return responses.howareyou[Math.floor(Math.random() * responses.howareyou.length)];
            }
            return responses.default[Math.floor(Math.random() * responses.default.length)];
        }
        
        function showPremium(name) {
            document.getElementById('premiumCharName').textContent = name;
            document.getElementById('premiumModal').classList.add('active');
        }
        
        function closePremium(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('premiumModal').classList.remove('active');
        }
        
        function openChat(name) {
            currentChar = name;
            document.getElementById('homeScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('chatName').textContent = name;
            
            const avatar = document.getElementById('chatAvatar');
            avatar.className = 'chat-avatar ' + avatarStyles[name];
            avatar.textContent = avatarLabels[name];
            
            conversationHistory = [];
            document.getElementById('chatMessages').innerHTML = '';
            
            const hellos = {
                'Eda': 'Merhaba! Ben Eda! Nasılsın?',
                'Ela': 'Merhaba! Hoşgeldin!',
                'Mila': 'Merhaba! Ben Mila!',
                'Teo': 'Merhaba! Ben Teo!',
                'Batu': 'Merhaba! Ben Batu!',
                'Mete': 'Merhaba! Ben Mete!'
            };
            addMessage(hellos[name] || 'Merhaba!', false);
        }
        
        function goHome() {
            document.getElementById('chatScreen').classList.remove('active');
            document.getElementById('homeScreen').classList.add('active');
            closePremium();
        }
        
        function addMessage(text, isUser) {
            const chatMsgs = document.getElementById('chatMessages');
            const now = new Date();
            const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ' + (isUser ? 'msg-sent' : 'msg-received');
            msgDiv.innerHTML = (isUser ? '' : '<b>' + currentChar + ':</b> ') + text.replace(/\n/g, '<br>') + '<div class="msg-time">' + time + '</div>';
            chatMsgs.appendChild(msgDiv);
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
        }
        
        function sendQuick(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            setTimeout(() => {
                addMessage(getResponse(text), false);
            }, 300 + Math.random() * 500);
        }
    </script>
</body>
</html>
