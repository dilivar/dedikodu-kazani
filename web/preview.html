<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı - iPhone Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* iPhone 16 Pro Max Frame */
        .iphone-frame {
            width: 320px;
            height: 650px;
            background: #000;
            border-radius: 55px;
            padding: 12px;
            position: relative;
            box-shadow: 
                0 0 0 2px #2a2a2a,
                0 0 0 4px #1a1a1a,
                0 50px 100px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.1);
        }

        /* Notch / Dynamic Island */
        .notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 28px;
            background: #000;
            border-radius: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notch-camera {
            width: 12px;
            height: 12px;
            background: #1a1a2e;
            border-radius: 50%;
            border: 2px solid #2a2a2a;
        }

        .notch-camera::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #4a4a6a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Screen */
        .screen {
            width: 100%;
            height: 100%;
            background: #f5f0ff;
            border-radius: 45px;
            overflow: hidden;
            position: relative;
        }

        .screen iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 45px;
        }

        /* Home indicator */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            z-index: 100;
        }

        /* Side buttons */
        .side-button {
            position: absolute;
            width: 4px;
            background: #2a2a2a;
            border-radius: 2px;
        }

        .side-button.up { top: 100px; right: -4px; height: 40px; }
        .side-button.down { top: 160px; right: -4px; height: 60px; }
        .side-button.power { top: 180px; left: -4px; height: 60px; }

        /* Info panel */
        .info-panel {
            color: white;
            max-width: 400px;
        }

        .info-panel h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #8B5CF6, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-panel p {
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .url-box {
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .url-box code {
            color: #8B5CF6;
            font-family: monospace;
        }

        .features {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .feature {
            background: rgba(139, 92, 246, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #A78BFA;
        }

        /* Loading state */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8B5CF6;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .control-btn:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .iphone-frame {
                width: 280px;
                height: 580px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="iphone-frame">
            <!-- Notch -->
            <div class="notch">
                <div class="notch-camera"></div>
            </div>
            
            <!-- Screen -->
            <div class="screen">
                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 15px;">Yükleniyor...</p>
                </div>
                <!-- Web app will be loaded here -->
                <iframe 
                    id="appFrame"
                    src="https://dedikodukazani.app" 
                    style="display: none;"
                    onload="hideLoading()"
                ></iframe>
            </div>
            
            <!-- Home indicator -->
            <div class="home-indicator"></div>
            
            <!-- Side buttons -->
            <div class="side-button up"></div>
            <div class="side-button down"></div>
            <div class="side-button power"></div>
        </div>
        
        <div class="info-panel">
            <h1>iPhone 16 Pro Max</h1>
            <p>Uygulamanın iPhone 16 Pro Max'daki görünümü. Ekran çözünürlüğü: 430 x 932 piksel (Notch dahil)</p>
            
            <div class="url-box">
                <p style="margin-bottom: 5px; color: #94a3b8; font-size: 0.9rem;">Sunucu URL:</p>
                <code id="serverUrl">http://<span id="ipAddress">loading...</span>:8181</code>
            </div>
            
            <div class="features">
                <span class="feature">💜 Mor Tema</span>
                <span class="feature">📱 Responsive</span>
                <span class="feature">✨ Animasyonlu</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="reloadApp()">🔄 Yenile</button>
        <button class="control-btn" onclick="openDevTools()">🔧 DevTools</button>
    </div>

    <script>
        // Get server IP
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ipAddress').textContent = data.ip;
            })
            .catch(() => {
                document.getElementById('ipAddress').textContent = 'localhost';
            });

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('appFrame').style.display = 'block';
        }

        function reloadApp() {
            const frame = document.getElementById('appFrame');
            frame.src = frame.src;
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('appFrame').style.display = 'none';
        }

        function openDevTools() {
            const frame = document.getElementById('appFrame');
            frame.contentWindow.postMessage('open-devtools', '*');
        }
    </script>
</body>
</html>
