<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dedikodu Kazanı</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #F5F0FF; }
.container { max-width: 400px; margin: 0 auto; background: #F5F0FF; min-height: 100vh; }
.header { background: linear-gradient(135deg, #8B5CF6, #6B4EFF); color: white; padding: 20px; text-align: center; }
.header h1 { font-size: 22px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
.card { background: white; border-radius: 16px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; }
.card img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
.card-name { font-weight: bold; margin-top: 8px; color: #2D3436; }
.badge { font-size: 18px; position: absolute; top: 8px; right: 8px; }
.screen { display: none; }
.screen.active { display: block; }
.back { background: #8B5CF6; color: white; padding: 12px 20px; border: none; border-radius: 20px; cursor: pointer; font-size: 16px; }
.chat-header { background: #8B5CF6; color: white; padding: 16px; display: flex; align-items: center; gap: 12px; }
.avatar { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
.messages { padding: 16px; min-height: 400px; }
.msg { background: white; padding: 12px 16px; border-radius: 18px; margin-bottom: 12px; max-width: 85%; }
.input-area { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px; display: flex; gap: 10px; }
.input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; }
.send-btn { background: #8B5CF6; color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; }
</style>
</head>
<body>
<div class="container" id="app">
    <!-- HOME SCREEN -->
    <div id="home" class="screen active">
        <div class="header">
            <h1>Dedikodu Kazanı</h1>
            <p>Sanal arkadaşların!</p>
        </div>
        <div class="grid">
            <div class="card" onclick="openChat('Eda')">
                <span class="badge">💎</span>
                <img src="https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_eda_new.png">
                <div class="card-name">Eda</div>
            </div>
            <div class="card" onclick="openChat('Teo')">
                <img src="https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_teo_new.png">
                <div class="card-name">Teo</div>
            </div>
            <div class="card" onclick="showPremium()">
                <span class="badge">💎</span>
                <img src="https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_ela_new.png">
                <div class="card-name">Ela</div>
            </div>
            <div class="card" onclick="showPremium()">
                <span class="badge">💎</span>
                <img src="https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_mila_new.png">
                <div class="card-name">Mila</div>
            </div>
            <div class="card" onclick="showPremium()">
                <span class="badge">💎</span>
                <img src="https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_batu_new.png">
                <div class="card-name">Batu</div>
            </div>
            <div class="card" onclick="showPremium()">
                <span class="badge">💎</span>
                <img src="https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_mete_new.png">
                <div class="card-name">Mete</div>
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat" class="screen">
        <div class="chat-header">
            <button class="back" onclick="goHome()">←</button>
            <img id="chatAvatar" class="avatar" src="">
            <span id="chatName">Eda</span>
        </div>
        <div class="messages" id="messages">
            <div class="msg">Merhaba! 👋</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Mesaj yaz...">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <!-- PREMIUM MODAL -->
    <div id="premium" class="screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;">
        <div style="background:white;padding:30px;border-radius:20px;text-align:center;max-width:300px;">
            <h2>💎 Premium</h2>
            <p>Tüm karakterlerle sohbet et!</p>
            <p style="font-size:24px;margin:20px 0;">9.99€ / ay</p>
            <button class="back" onclick="document.getElementById('premium').style.display='none'">Kapat</button>
        </div>
    </div>
</div>

<script>
const charImages = {
    'Eda': 'https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_eda_new.png',
    'Teo': 'https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_teo_new.png',
    'Ela': 'https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_ela_new.png',
    'Mila': 'https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_mila_new.png',
    'Batu': 'https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_batu_new.png',
    'Mete': 'https://raw.githubusercontent.com/dilivar/dedikodu-kazani/main/char_mete_new.png'
};

function openChat(name) {
    document.getElementById('home').classList.remove('active');
    document.getElementById('chat').classList.add('active');
    document.getElementById('chatName').textContent = name;
    document.getElementById('chatAvatar').src = charImages[name];
    document.getElementById('messages').innerHTML = '<div class="msg">Merhaba! Ben ' + name + ', nasılsın? 👋</div>';
}

function goHome() {
    document.getElementById('chat').classList.remove('active');
    document.getElementById('home').classList.add('active');
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    
    const msgs = document.getElementById('messages');
    msgs.innerHTML += '<div class="msg" style="background:#8B5CF6;color:white;margin-left:auto;">' + text + '</div>';
    input.value = '';
    
    setTimeout(() => {
        msgs.innerHTML += '<div class="msg">Harika! 🙌</div>';
        msgs.scrollTop = msgs.scrollHeight;
    }, 500);
}

function showPremium() {
    document.getElementById('premium').style.display = 'flex';
}

// Enter key for sending
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        const chatActive = document.getElementById('chat').classList.contains('active');
        if (chatActive) sendMsg();
    }
});
</script>
</body>
</html>
