<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedikodu Kazanı - Grup Araması</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        :root { --primary: #8B5CF6; --bg: #F5F0FF; --text: #1A1A2E; }
        body { background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .call-screen {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 932px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Bölünmüş ekranlar */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(4, 1fr);
            height: 100%;
            gap: 2px;
        }
        
        .participant {
            position: relative;
            background: #2a2a3e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .participant.voice-active {
            background: linear-gradient(135deg, var(--primary), #6B4EFF);
        }
        
        .participant-avatar {
            font-size: 40px;
            margin-bottom: 8px;
        }
        
        .participant-name {
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .participant-status {
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            margin-top: 4px;
        }
        
        /* Speaking indicator */
        .speaking {
            position: absolute;
            bottom: 10px;
            display: flex;
            gap: 3px;
        }
        
        .speaking span {
            width: 3px;
            height: 10px;
            background: #22C55E;
            border-radius: 2px;
            animation: speak 0.5s infinite;
        }
        
        .speaking span:nth-child(2) { animation-delay: 0.1s; }
        .speaking span:nth-child(3) { animation-delay: 0.2s; }
        
        @keyframes speak {
            0%, 100% { height: 10px; }
            50% { height: 20px; }
        }
        
        /* Kullanıcı (dinleyici) */
        .user-view {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: #3a3a4e;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--primary);
        }
        
        .user-view span {
            font-size: 30px;
        }
        
        /* Controls */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
        }
        
        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .btn-mute {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn-end {
            background: #EF4444;
            color: white;
        }
        
        .btn-share {
            background: var(--primary);
            color: white;
        }
        
        /* Paylaşımlar */
        .share-btn {
            position: absolute;
            top: 50px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        /* Header */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 50px 20px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .timer {
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        
        .participant-count {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }
        
        /* Info text */
        .info-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="call-screen">
        <!-- Header -->
        <div class="header">
            <span class="timer" id="timer">00:00</span>
            <span class="participant-count">7 kişi</span>
        </div>
        
        <!-- Paylaşım butonu -->
        <button class="share-btn" onclick="shareFile()">
            📷 Belge/Foto
        </button>
        
        <!-- Bölünmüş ekran -->
        <div class="grid-view">
            <div class="participant voice-active">
                <div class="participant-avatar">👩‍🍳</div>
                <div class="participant-name">Eda</div>
                <div class="participant-status">Konuşuyor...</div>
                <div class="speaking"><span></span><span></span><span></span></div>
            </div>
            <div class="participant">
                <div class="participant-avatar">💅</div>
                <div class="participant-name">Ela</div>
                <div class="participant-status">Dinliyor</div>
            </div>
            <div class="participant">
                <div class="participant-avatar">🥗</div>
                <div class="participant-name">Zeynep</div>
                <div class="participant-status">Dinliyor</div>
            </div>
            <div class="participant">
                <div class="participant-avatar">👶</div>
                <div class="participant-name">Derin</div>
                <div class="participant-status">Dinliyor</div>
            </div>
            <div class="participant">
                <div class="participant-avatar">💕</div>
                <div class="participant-name">Rüzgar</div>
                <div class="participant-status">Dinliyor</div>
            </div>
            <div class="participant">
                <div class="participant-avatar">📰</div>
                <div class="participant-name">Mert</div>
                <div class="participant-status">Dinliyor</div>
            </div>
            <div class="participant">
                <div class="participant-avatar">💰</div>
                <div class="participant-name">Fatih</div>
                <div class="participant-status">Dinliyor</div>
            </div>
            <div class="participant">
                <div class="participant-avatar">📷</div>
                <div class="participant-name">Paylaşım</div>
                <div class="participant-status">Görsel</div>
            </div>
        </div>
        
        <!-- Kullanıcı (dinleyici) -->
        <div class="user-view">
            <span>👤</span>
        </div>
        
        <!-- Info -->
        <div class="info-text">
            🎧 Sen dinliyorsun<br>
            Karakterler tartışıyor
        </div>
        
        <!-- Controls -->
        <div class="controls">
            <button class="control-btn btn-share" onclick="shareFile()">📷</button>
            <button class="control-btn btn-mute" onclick="toggleMute()">🎤</button>
            <button class="control-btn btn-end" onclick="endCall()">📞</button>
        </div>
    </div>

    <script>
        let duration = 0;
        setInterval(() => {
            duration++;
            const mins = Math.floor(duration / 60).toString().padStart(2, '0');
            const secs = (duration % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = mins + ':' + secs;
        }, 1000);
        
        function shareFile() {
            alert('📷 Belge/Foto paylaşım penceresi açılır\n\n(Gerçek uygulamada: Gallery/Camera seçimi)');
        }
        
        function toggleMute() {
            alert('🎤 Mikrofon açık/kapalı');
        }
        
        function endCall() {
            if(confirm('Aramayı sonlandırmak istiyor musun?')) {
                alert('🔴 Arama sonlandırıldı');
            }
        }
    </script>
</body>
</html>
